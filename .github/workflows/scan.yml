name: WordPress Security Scanner

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Website URL to scan (example: https://example.com)'
        required: true
        type: string

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow pushing results back to repo
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - run: pip install -r requirements.txt
      
      - name: Run WordPress Scanner
        run: |
          python scanner/main.py --url "${{ github.event.inputs.target_url }}" --output latest-scan.json
      
      - name: Create results directory
        run: |
          mkdir -p docs/results
          mv latest-scan.json docs/results/
          
          # Also save with timestamp
          cp docs/results/latest-scan.json docs/results/scan-$(date +'%Y%m%d-%H%M%S').json
      
      - name: Update scan history
        run: |
          echo "[" > docs/results/history.json
          ls docs/results/scan-*.json | head -5 | while read file; do
            cat "$file" >> docs/results/history.json
            echo "," >> docs/results/history.json
          done
          echo "{}]" >> docs/results/history.json
      
      - name: Commit and push results
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add docs/results/
          git commit -m "Add scan results for ${{ github.event.inputs.target_url }}" || exit 0
          git push
